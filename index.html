<!DOCTYPE html>
<html lang="en">
<head>
    <title>Fandom Relationships Tracker</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-heart"></i> Fandom Relationships Tracker</h1>
            <p>I'm tracking and organizing the relationships that I like throughout any fandoms I am in.</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-info">
                    <h3>TOTAL SHIPS</h3>
                    <div class="count" id="total-count">0</div>
                </div>
            </div>
        </div>

        <div class="action-bar">
            <input type="text" id="search-input" placeholder="Search by ship name or fandom...">
        </div>

        <div class="main-layout">
            <div class="fandom-sidebar">
                <h3>Fandoms</h3>
                <ul id="fandom-list" class="fandom-list"></ul>
            </div>

            <div class="grid-container">
                <div id="pairings-grid" class="pairings-grid"></div>
            </div>
        </div>
    </div>

    <div id="expanded-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeExpandedModal()">&times;</span>
            <div class="expanded-layout">
                <div class="slideshow-container">
                    <div id="slideshow-images" class="slideshow-images"></div>
                    <a class="prev" onclick="changeSlide(-1)">&#10094;</a>
                    <a class="next" onclick="changeSlide(1)">&#10095;</a>
                    <div class="slide-dots" id="slide-dots"></div>
                </div>
                <div class="expanded-details">
                    <h2 id="exp-name"></h2>
                    <p id="exp-characters" class="pairing-characters"></p>
                    <div class="notes-container">
                        <h4>Notes</h4>
                        <p id="exp-notes"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
